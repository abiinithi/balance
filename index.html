<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="A minimalist, tactile Nothing OS styled 2x2 widget for tracking your remaining account balance manually.">
  <meta name="theme-color" content="#000000">
  
  <title>balance</title>
  
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Dotted Grid Aesthetic Background -->
  <div class="grid-overlay" aria-hidden="true"></div>

  <!-- App Main Wrapper -->
  <div class="app-layout">

    <!-- TAB: DASHBOARD -->
    <div id="tab-dashboard" class="tab-content active">
      <!-- Top Section: General Balance Widget -->
    <main class="widget-container" id="widget-card">
      <!-- Swipe Hints -->
      <div class="swipe-hint top" id="hint-top" aria-hidden="true">↓ ADD</div>
      <div class="swipe-hint bottom" id="hint-bottom" aria-hidden="true">↑ SUBTRACT</div>

      <!-- Main Widget View -->
      <div class="widget-content" id="widget-main-view">
        <header>
          <select class="widget-header-select" id="widget-bucket-select" aria-label="Select bucket to display">
            <option value="total">TOTAL BALANCE</option>
          </select>
        </header>

        <div class="balance-display-container">
          <h1 class="balance-value" id="balance-amount">₹0</h1>
        </div>

        <footer class="widget-footer">
          <div class="red-dot" id="widget-accent-dot" aria-hidden="true"></div>
        </footer>
      </div>

      <!-- Swipe Down Overlay: Incoming (Add) -->
      <section class="overlay incoming" id="overlay-incoming" aria-label="Add Incoming Balance">
        <div class="overlay-header">
          <span class="overlay-title">INCOMING AMOUNT</span>
          <button class="overlay-close" id="btn-close-incoming" type="button" aria-label="Close add panel">✕</button>
        </div>
        <div class="overlay-body">
          <div class="amount-input-wrapper">
            <span class="amount-prefix" aria-hidden="true">+</span>
            <input
              type="number"
              pattern="[0-9]*"
              inputmode="numeric"
              class="amount-input"
              id="input-incoming"
              placeholder="0"
              aria-label="Enter incoming amount in rupees"
            >
          </div>
        </div>
        <div class="overlay-footer">
          <button class="action-btn submit" id="btn-submit-incoming" type="button">ADD</button>
        </div>
      </section>

      <!-- Swipe Up Overlay: Outgoing (Subtract) -->
      <section class="overlay outgoing" id="overlay-outgoing" aria-label="Subtract Outgoing Balance">
        <div class="overlay-header">
          <span class="overlay-title">OUTGOING AMOUNT</span>
          <button class="overlay-close" id="btn-close-outgoing" type="button" aria-label="Close subtract panel">✕</button>
        </div>
        <div class="overlay-body">
          <div class="amount-input-wrapper">
            <span class="amount-prefix" aria-hidden="true">-</span>
            <input
              type="number"
              pattern="[0-9]*"
              inputmode="numeric"
              class="amount-input"
              id="input-outgoing"
              placeholder="0"
              aria-label="Enter outgoing amount in rupees"
            >
          </div>
        </div>
        <div class="overlay-footer">
          <button class="action-btn submit" id="btn-submit-outgoing" type="button">SUBTRACT</button>
        </div>
      </section>

      <!-- Widget Level Overlay: Transaction Details (Bucket & Note) -->
      <section class="overlay incoming" id="overlay-transaction-details" aria-label="Transaction Details" style="z-index: 15;">
        <div class="overlay-header">
          <span class="overlay-title" id="transaction-details-title">DETAILS</span>
          <button class="overlay-close" id="btn-close-transaction-details" type="button">✕</button>
        </div>
        <div class="overlay-body" style="justify-content: flex-start; padding-top: 20px;">
          <div class="bucket-field-group">
            <label for="select-transaction-bucket" class="field-label">Select Bucket</label>
            <select class="text-input" id="select-transaction-bucket">
              <!-- Dynamically populated -->
            </select>
          </div>
          <div class="bucket-field-group" style="margin-top: 16px;">
            <label for="input-transaction-note" class="field-label">Note (Optional)</label>
            <input type="text" class="text-input" id="input-transaction-note" placeholder="What was this for?" maxlength="50">
          </div>
        </div>
        <div class="overlay-footer">
          <button class="action-btn submit" id="btn-confirm-transaction" type="button">CONFIRM</button>
        </div>
      </section>
    </main>

    <!-- Savings Section -->
    <section class="savings-section" aria-labelledby="savings-heading">
      <div class="savings-header">
        <h2 class="savings-heading" id="savings-heading">savings buckets</h2>
        <button class="add-bucket-btn" id="btn-add-bucket" type="button" aria-label="Add new savings bucket">+ ADD BUCKET</button>
      </div>

      <div class="buckets-list" id="buckets-list">
        <!-- Dynamic list entries rendered via JS -->
      </div>
    </section>
    </div> <!-- END TAB: DASHBOARD -->

    <!-- TAB: HISTORY -->
    <div id="tab-history" class="tab-content">
      <div class="history-header">
        <h2 class="savings-heading">TRANSACTION HISTORY</h2>
      </div>
      <div class="history-list" id="history-list">
        <!-- Dynamic transaction entries rendered via JS -->
      </div>
    </div> <!-- END TAB: HISTORY -->

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-dashboard" type="button">DASHBOARD</button>
      <button class="nav-btn" id="nav-history" type="button">HISTORY</button>
    </nav>

    <!-- Overlay: Create Bucket Drawer (slides down from top of screen) -->
    <section class="overlay incoming app-level" id="overlay-create-bucket" aria-label="Create Bucket">
      <div class="overlay-header">
        <span class="overlay-title">NEW BUCKET</span>
        <button class="overlay-close" id="btn-close-create-bucket" type="button" aria-label="Close panel">✕</button>
      </div>
      <div class="overlay-body">
        <div class="bucket-field-group">
          <label for="select-create-bucket-type" class="field-label">Type</label>
          <select class="text-input" id="select-create-bucket-type">
            <option value="budget">Monthly Budget</option>
            <option value="saving">Savings Goal</option>
          </select>
        </div>
        <div class="bucket-field-group">
          <label for="input-create-bucket-name" class="field-label">Name</label>
          <input type="text" class="text-input" id="input-create-bucket-name" placeholder="e.g. Groceries" maxlength="20">
        </div>
        <div class="bucket-field-group">
          <label for="input-create-bucket-target" class="field-label">Target Amount (₹)</label>
          <input type="number" pattern="[0-9]*" inputmode="numeric" class="text-input" id="input-create-bucket-target" placeholder="0">
        </div>
      </div>
      <div class="overlay-footer">
        <button class="action-btn submit" id="btn-submit-create-bucket" type="button">CREATE</button>
      </div>
    </section>

    <!-- Overlay: Manage Bucket Detail Drawer (slides up from bottom of screen) -->
    <section class="overlay outgoing app-level" id="overlay-bucket-manager" aria-label="Manage Savings Bucket">
      <div class="overlay-header">
        <span class="overlay-title" id="bucket-manager-title">MANAGE BUCKET</span>
        <button class="overlay-close" id="btn-close-bucket-manager" type="button" aria-label="Close panel">✕</button>
      </div>
      <div class="overlay-body">
        <!-- Rename -->
        <div class="bucket-field-group">
          <label for="input-bucket-name" class="field-label">Rename Bucket</label>
          <input type="text" class="text-input" id="input-bucket-name" placeholder="Enter bucket name" maxlength="20">
        </div>

        <!-- Target Amount -->
        <div class="bucket-field-group">
          <label for="input-bucket-target" class="field-label">Target Amount</label>
          <input type="number" pattern="[0-9]*" inputmode="numeric" class="text-input" id="input-bucket-target" placeholder="0">
        </div>

        <!-- Transaction Amount -->
        <div class="bucket-field-group">
          <label for="input-bucket-amount" class="field-label">Transaction Amount (₹)</label>
          <div class="amount-input-wrapper small">
            <input
              type="number"
              pattern="[0-9]*"
              inputmode="numeric"
              class="amount-input"
              id="input-bucket-amount"
              placeholder="0"
              aria-label="Transaction amount in rupees"
            >
          </div>
        </div>
      </div>
      <div class="overlay-footer split">
        <button class="action-btn danger" id="btn-delete-bucket" type="button">DELETE</button>
        <div class="action-group-right">
          <button class="action-btn" id="btn-withdraw-bucket" type="button">WITHDRAW</button>
          <button class="action-btn submit" id="btn-deposit-bucket" type="button">DEPOSIT</button>
        </div>
      </div>
    </section>

  </div>

  <!-- Overlay: Month-End Resolution (Appears on Launch) -->
  <section class="overlay app-level incoming" id="overlay-month-end" aria-label="Month End Resolution" style="z-index: 200;">
    <div class="overlay-header">
      <span class="overlay-title">MONTH END RESOLUTION</span>
    </div>
    <div class="overlay-body" style="justify-content: flex-start; overflow-y: auto;">
      <p style="font-family: var(--font-sans); font-size: 11px; color: var(--text-secondary); line-height: 1.4; margin: 0 0 16px 0;">
        You have leftover funds in your budget buckets from last month. Resolve them before starting the new month.
      </p>
      
      <div id="resolution-buckets-container" style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Dynamically populated leftover buckets -->
      </div>
    </div>
    <div class="overlay-footer">
      <button class="action-btn submit" id="btn-complete-resolution" type="button" disabled>FINISH & START MONTH</button>
    </div>
  </section>

  <script src="/app.js"></script>
  <script>
    // Register Service Worker for PWA offline capabilities
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('ServiceWorker registered successfully: ', registration.scope);
          })
          .catch((error) => {
            console.log('ServiceWorker registration failed: ', error);
          });
      });
    }
  </script>
</body>
</html>
